{% extends "defense/base.html" %}
{% block title %}Login - AIMS Defense Portal{% endblock %}
{% block extra_css %}
<style>
.login-wrap {
    min-height: calc(100vh - 130px);
    display: flex;
    align-items: center;
    justify-content: center;
}
.login-card {
    background: white;
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(107,11,31,0.15);
    padding: 3rem 2.5rem;
    width: 100%;
    max-width: 420px;
    text-align: center;
}
.login-logo {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--aims-red);
    margin-bottom: 1.2rem;
}
.login-card h2 { color: var(--aims-red); font-size: 1.5rem; margin-bottom: 0.3rem; }
.login-card p { color: #666; font-size: 0.9rem; margin-bottom: 2rem; }
.pwd-input-wrap { position: relative; margin-bottom: 1.2rem; }
.pwd-input-wrap input {
    width: 100%;
    padding: 0.85rem 3rem 0.85rem 1rem;
    border: 2px solid var(--gray-200);
    border-radius: 8px;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 3px;
}
.pwd-input-wrap input:focus { border-color: var(--aims-red); }
.toggle-pwd {
    position: absolute; right: 12px; top: 50%;
    transform: translateY(-50%);
    cursor: pointer; color: #999;
    background: none; border: none; padding: 4px;
}
.login-btn {
    width: 100%;
    padding: 0.9rem;
    background: var(--aims-red);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
}
.login-btn:hover { background: var(--aims-dark); transform: translateY(-1px); }
.login-btn:active { transform: translateY(0); }
</style>
{% endblock %}
{% block content %}
<div class="login-wrap">
    <div class="login-card">
        {% load static %}
        <img src="{% static 'defense/img/aims-logo.jpg' %}" alt="AIMS" class="login-logo">
        <h2>Defense Portal</h2>
        <p>Enter the access password to continue</p>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="pwd-input-wrap">
                <input type="password" name="password" id="pwdField" placeholder="Enter password" autofocus required>
                <button type="button" class="toggle-pwd" onclick="togglePwd()">
                    <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>
            <button type="submit" class="login-btn">Access Platform</button>
        </form>
    </div>
</div>
<script>
function togglePwd() {
    const f = document.getElementById('pwdField');
    f.type = f.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
